services:
  - type: web
    name: insiders-scanner
    runtime: docker
    region: oregon
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: scanner-db
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: SCANNER_MIN_SCORE
        value: "50"
      - key: SCANNER_INTERVAL
        value: "300"